name: Build & Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            bun_target: bun-windows-x64
            bun_ext: .exe
          - os: macos-latest
            platform: mac
            bun_target: bun-darwin-arm64
            bun_ext: ""
          - os: ubuntu-latest
            platform: linux
            bun_target: bun-linux-x64
            bun_ext: ""
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install app dependencies
        run: npm ci
      - name: Install engine dependencies
        run: cd engine && bun install
      - name: Copy Bun binary to engine/bin
        shell: bash
        run: |
          mkdir -p engine/bin
          BUN_PATH=$(which bun)
          cp "$BUN_PATH" "engine/bin/bun${{ matrix.bun_ext }}"
          chmod +x "engine/bin/bun${{ matrix.bun_ext }}" 2>/dev/null || true
          ls -lh engine/bin/
      - name: Write build-time secrets
        shell: bash
        env:
          GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          # Inject GitHub OAuth client secret into electron/secrets.json, read by main.cjs
          # at launch. If the GitHub Actions secret is missing the file is written empty —
          # app still runs, only the "import from GitHub" feature shows an explicit error.
          node -e "
            const fs = require('fs');
            const secrets = {};
            if (process.env.GH_OAUTH_CLIENT_ID) secrets.GITHUB_CLIENT_ID = process.env.GH_OAUTH_CLIENT_ID;
            if (process.env.GH_OAUTH_SECRET) secrets.GITHUB_CLIENT_SECRET = process.env.GH_OAUTH_SECRET;
            fs.writeFileSync('electron/secrets.json', JSON.stringify(secrets, null, 2));
            console.log('secrets.json written, keys:', Object.keys(secrets));
          "
      - name: Build frontend
        run: npx vite build
      - name: Build & Publish (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Publish (Mac)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Publish (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage deb --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
